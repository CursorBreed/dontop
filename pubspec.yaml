name: dont_tap_rogue_op
description: "Don't Tap Rogue Op - A Flame-powered mobile game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.36.0
  flame_audio: ^2.12.0
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon.png
  adaptive_icon_background: "#050505"
  adaptive_icon_foreground: assets/images/icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/font/SpaceMono-Regular.ttf
        - asset: assets/font/SpaceMono-Bold.ttf
          weight: 700
        - asset: assets/font/SpaceMono-Italic.ttf
          style: italic
        - asset: assets/font/SpaceMono-BoldItalic.ttf
          weight: 700
          style: italic
